server {
    listen 80;
    server_name <url>;
    # Перенаправляем любой HTTP-трафик от Cloudflare на безопасный HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name <url>;

    # Пути к ключам ECC внутри контейнера Nginx
    ssl_certificate /etc/nginx/ssl/cloudflare.crt;
    ssl_certificate_key /etc/nginx/ssl/cloudflare.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://jenkins:8080;

        # Передаем оригинальные заголовки (это уберет ошибку Reverse proxy broken)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Поддержка WebSockets для стабильной работы UI Jenkins
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
